<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Real-Time Chat</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 { margin-top: 0; }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .toggle-link {
            color: #007bff;
            cursor: pointer;
            font-size: 0.9em;
            text-align: center;
            display: block;
            margin-top: 10px;
        }
        .error { color: red; font-size: 0.9em; margin-bottom: 10px; }
        .success-banner { color: #28a745; font-size: 0.95em; margin-bottom: 10px; font-weight: bold; text-align: center; }
        
        /* Chat Specific Styles */
        .header { display: flex; justify-content: space-between; align-items: center; }
        .chat-container { display: flex; flex-direction: column; gap: 10px; }
        .chat-box {
            border: 1px solid #ddd;
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 75%;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            word-wrap: break-word;
        }
        .message.sent {
            background-color: #dcf8c6;
            align-self: flex-end;
            border: 1px solid #c2e5a7;
        }
        .message.received {
            background-color: white;
            align-self: flex-start;
            border: 1px solid #ddd;
        }
        .message .time {
            display: block;
            font-size: 0.7em;
            color: #888;
            margin-top: 5px;
            text-align: right;
        }
        .send-area {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .send-area input { flex-grow: 1; }

        /* My ID Badge Style */
        .my-id-badge {
            font-size: 0.5em;
            color: #495057;
            background: #e9ecef;
            padding: 4px 10px;
            border-radius: 20px;
            margin-left: 10px;
            font-weight: normal;
            vertical-align: middle;
            border: 1px solid #ced4da;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h2 id="auth-title">Login</h2>
        <div id="auth-error" class="error"></div>
        <form id="auth-form">
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-btn">Login</button>
            </div>
        </form>
        <span class="toggle-link" id="toggle-auth">Don't have an account? Register here.</span>
    </div>

    <div id="chat-section" style="display: none;">
        <div class="header">
            <h2>Real-Time Chat<span id="my-id-display" class="my-id-badge" style="display: none;"></span></h2>
            <button onclick="logout()" style="background-color: #dc3545;">Logout</button>
        </div>
        <div id="registration-success" class="success-banner"></div>
        <div id="chat-error" class="error"></div>
        
        <div class="form-group" style="flex-direction: row;">
            <input type="number" id="contact-id" placeholder="Contact ID (e.g., 2)" style="flex-grow: 1;">
            <button onclick="fetchChatHistory()">Load Chat</button>
        </div>

        <div class="chat-container">
            <div id="chat-box" class="chat-box">
                <p style="text-align: center; color: #888;">Enter a contact ID to view history.</p>
            </div>
            
            <div class="send-area">
                <input type="text" id="message-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    const BASE_URL = 'http://localhost:8000'; 
    const WS_URL = 'ws://localhost:8000'; 
    
    let isLoginMode = true;
    let token = localStorage.getItem('chat_token');
    let myUserId = null;
    let ws = null;

    // DOM Elements
    const authSection = document.getElementById('auth-section');
    const chatSection = document.getElementById('chat-section');
    const authForm = document.getElementById('auth-form');
    const authTitle = document.getElementById('auth-title');
    const authBtn = document.getElementById('auth-btn');
    const toggleAuth = document.getElementById('toggle-auth');
    const authError = document.getElementById('auth-error');
    const chatError = document.getElementById('chat-error');
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const contactInput = document.getElementById('contact-id');
    const myIdDisplay = document.getElementById('my-id-display');
    const registrationSuccess = document.getElementById('registration-success');

    // Utility: Decode JWT token to get our own user ID
    function getUserIdFromToken(token) {
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            return parseInt(payload.sub);
        } catch (e) {
            return null;
        }
    }

    // Check auth status on load
    if (token) {
        myUserId = getUserIdFromToken(token);
        showChat();
        connectWebSocket();
    }

    // Toggle between Login and Register
    toggleAuth.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        authTitle.textContent = isLoginMode ? 'Login' : 'Register';
        authBtn.textContent = isLoginMode ? 'Login' : 'Register';
        toggleAuth.textContent = isLoginMode ? "Don't have an account? Register here." : "Already have an account? Login here.";
        authError.textContent = '';
    });

    // Handle Auth Form Submission
    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        authError.textContent = '';
        registrationSuccess.textContent = '';
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            let registeredId = null;
            if (!isLoginMode) {
                const regRes = await fetch(`${BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (!regRes.ok) throw new Error('Registration failed. Username might be taken.');
                
                // Parse response structure containing the ID from UserResponse
                const regData = await regRes.json();
                registeredId = regData.id;
            }

            const params = new URLSearchParams();
            params.append('username', username);
            params.append('password', password);

            const loginRes = await fetch(`${BASE_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });

            if (!loginRes.ok) throw new Error('Invalid credentials.');
            
            const data = await loginRes.json();
            token = data.access_token;
            localStorage.setItem('chat_token', token);
            myUserId = getUserIdFromToken(token);
            
            showChat();
            connectWebSocket();

            // Display success message containing the user ID if registration just completed
            if (registeredId !== null) {
                registrationSuccess.textContent = `🎉 Registration successful! Your User ID is ${registeredId}`;
            }

        } catch (err) {
            authError.textContent = err.message;
        }
    });

    function connectWebSocket() {
        if (ws) ws.close(); 
        
        ws = new WebSocket(`${WS_URL}/ws?token=${token}`);

        ws.onopen = () => console.log("WebSocket Connected");
        
        ws.onmessage = (event) => {
            const newMsg = JSON.parse(event.data);
            const activeContactId = parseInt(contactInput.value);
            
            if (newMsg.sender_id === activeContactId || newMsg.receiver_id === activeContactId) {
                if (chatBox.innerHTML.includes('text-align: center')) {
                    chatBox.innerHTML = '';
                }
                appendMessage(newMsg);
            }
        };

        ws.onclose = () => console.log("WebSocket Disconnected");
        ws.onerror = (err) => console.error("WebSocket Error:", err);
    }

    function sendMessage() {
        const content = messageInput.value.trim();
        const contactId = contactInput.value;

        if (!content) return;
        if (!contactId) {
            chatError.textContent = "Please enter a Contact ID to chat with.";
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            chatError.textContent = "Connection lost. Please refresh the page.";
            return;
        }

        chatError.textContent = '';

        const payload = {
            receiver_id: parseInt(contactId),
            message: content
        };

        ws.send(JSON.stringify(payload));
        messageInput.value = ''; 
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    async function fetchChatHistory() {
        const contactId = contactInput.value;
        if (!contactId) return;
        
        chatError.textContent = '';
        chatBox.innerHTML = '<p style="text-align: center; color: #888;">Loading...</p>';

        try {
            const res = await fetch(`${BASE_URL}/chat/history/${contactId}`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (res.status === 401) {
                logout();
                throw new Error('Session expired. Please login again.');
            }
            if (!res.ok) throw new Error('Failed to load chat history.');

            const messages = await res.json();
            
            chatBox.innerHTML = '';
            if (messages.length === 0) {
                chatBox.innerHTML = '<p style="text-align: center; color: #888;">No messages yet. Say hi!</p>';
                return;
            }

            messages.forEach(msg => appendMessage(msg));
        } catch (err) {
            chatError.textContent = err.message;
            chatBox.innerHTML = '';
        }
    }

    function appendMessage(msg) {
        const div = document.createElement('div');
        const isSent = (msg.sender_id === myUserId); 
        
        div.className = `message ${isSent ? 'sent' : 'received'}`;
        
        const content = document.createElement('span');
        content.textContent = msg.content;
        
        const time = document.createElement('span');
        time.className = 'time';
        time.textContent = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        div.appendChild(content);
        div.appendChild(time);
        chatBox.appendChild(div);

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // UI State Management
    function showChat() {
        authSection.style.display = 'none';
        chatSection.style.display = 'block';

        // Update the badge with the current user ID
        if (myUserId) {
            myIdDisplay.textContent = `Your ID: ${myUserId}`;
            myIdDisplay.style.display = 'inline-block';
        }
    }

    function logout() {
        if (ws) ws.close();
        token = null;
        myUserId = null;
        localStorage.removeItem('chat_token');
        authSection.style.display = 'block';
        chatSection.style.display = 'none';
        authForm.reset();
        messageInput.value = '';
        contactInput.value = '';
        chatError.textContent = '';
        registrationSuccess.textContent = '';
        myIdDisplay.style.display = 'none';
        chatBox.innerHTML = '<p style="text-align: center; color: #888;">Enter a contact ID to view history.</p>';
    }
</script>

</body>
</html>
